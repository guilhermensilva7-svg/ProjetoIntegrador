<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastre-se - NutriCampo</title>
    <link rel="shortcut icon" href="Imagens/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="style/Login.css">
</head>
<body>
    <header>
            <nav>
                <a href="Vagas.html">Vagas</a>
                <a href="Sobre nós.html">Nós</a>
                <a href="Login.html">Login</a>
                <a href="Index.html">Início</a>
             </nav>
             <img class="logo" src="Imagens/2.png">
    </header>
    
    <div class="main-container">
        <h1 class="title">Cadastre-se</h1>
        <form method="post" action="#" class="registration-form">
            <div class="input-group">
                <label for="usuario">NOME DE USUÁRIO</label>
                <input type="text" id="usuario" name="usuario" placeholder="Ex: joaosilva" required>
            </div>
            <div class="input-group">
                <label for="email">E-MAIL</label>
                <input type="email" id="email" name="email" placeholder="exemplo@email.com" required>
            </div>
            <div class="input-group">
                <label for="cpf">CPF</label>
                <input type="text" id="cpf" name="cpf" placeholder="000.000.000-00" required>
            </div>
            <div class="input-group">
                <label for="senha">SENHA</label>
                <input type="password" id="senha" name="senha" placeholder="Mínimo 6 caracteres" required>
            </div>
            <button type="submit" class="btn-submit">CRIAR MINHA CONTA</button>
        </form>
        </div>
        <footer>
    <div class="footer-inner">
      <div>
        <img src="Imagens/Design sem nome.png" alt="Logo">
      </div>
      <div>
        <p class="footer-slogan">Tecnologia e sustentabilidade para a máxima produtividade no campo.</p>
        <div style="margin-top:16px; text-align:center;">
          <p style="font-size:14px; margin-bottom:6px;" class="links"><a href="https://api.whatsapp.com/">whatsapp</a></p>
          <p style="font-size:14px; margin-bottom:6px;" class="links"><a href="https://www.instagram.com/guilhermenves_/" style="color:#fff;">Instagram</a></p>
          <p style="font-size:14px;" class="links"><a href="https://www.facebook.com/plantmaax" style="color:#fff;">Facebook</a></p>
        </div>
      </div>
      <div class="footer-map">
        <iframe src="https://www.google.com/maps/embed?pb=!1m14!1m12!1m3!1d14154.86248031609!2d-54.46497666517898!3d-21.07574798499564!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!5e1!3m2!1spt-BR!2sbr!4v1773154959533!5m2!1spt-BR!2sbr" width="200" height="150" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
      </div>
    </div>
